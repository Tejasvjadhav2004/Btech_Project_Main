version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: scm-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: Tejas@8600
      MONGO_INITDB_DATABASE: supply_chain_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - scm-network

  mongo-express:
    image: mongo-express:1.0.0
    container_name: scm-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: Tejas@8600
      ME_CONFIG_MONGODB_URL: mongodb://root:Tejas@8600@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: Tejas@8600
    depends_on:
      - mongodb
    networks:
      - scm-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  scm-network:
    driver: bridge
